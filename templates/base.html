<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>
      {% if submission is defined %}{{ submission.business_name }} - {{ PRODUCT.report_name }}{% else %}{{ PRODUCT.short_name }}{% endif %}
    </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css" />
    <style>
      :root { --spacing: 1.5rem; }
      article { max-width: 800px; margin: 2rem auto; }
      .print-header, .print-footer { display: none; }
      
      /* --- PDF & Print Optimization --- */
      @media print {
        header, footer, .no-print { display: none !important; }
        .print-header, .print-footer { display: block; position: fixed; width: 100%; text-align: center; font-size: 9pt; color: #666; }
        .print-header { top: 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .print-footer { bottom: 0; border-top: 1px solid #eee; padding-top: 5px; }
        body { font-size: 11pt; line-height: 1.5; }
        section { page-break-inside: avoid; }
      }
    </style>
  </head>
  <body>
    <div class="print-header">{{ PRODUCT.name }} — {{ PRODUCT.report_name }}</div>
    
    {% if submission is defined %}
    <div class="print-footer">
      {{ submission.business_name }} · {{ submission.created_at_human }} · Seite <span class="page"></span>
    </div>
    {% endif %}

    <main class="container">
      <header class="no-print">
        <hgroup>
          <h1>{{ PRODUCT.name }}</h1>
          <h2>{{ PRODUCT.tagline }}</h2>
        </hgroup>
      </header>

      {% block content %}{% endblock %}

      <footer class="no-print">
        <hr />
        <small>{{ DISCLAIMERS.website }}</small>
      </footer>
    </main>
  </body>
</html>
