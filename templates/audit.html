{% extends "base.html" %} {% block content %}

<h2>Schneller Cybersecurity-Check (ca. 5 Minuten)</h2>

<form action="{{ url_for('submit') }}" method="post">
  <label for="business_name">Name des Unternehmens / der Praxis</label>
  <input id="business_name" name="business_name" required />

  <label for="email">Geschäftliche E-Mail-Adresse</label>
  <input id="email" name="email" type="email" required />

  <hr />

  {% for q in questions %}
  <fieldset>
    <legend>{{ loop.index }}. {{ q.text }}</legend>
    <label>
      <input type="radio" name="{{ q.id }}" value="yes" required />
      Ja
    </label>
    <label>
      <input type="radio" name="{{ q.id }}" value="no" />
      Nein
    </label>
    <label>
      <input type="radio" name="{{ q.id }}" value="na" />
      Nicht zutreffend
    </label>
  </fieldset>
  {% endfor %}

  <button type="submit">Score berechnen</button>
</form>

{% endblock %}
