{% extends "base.html" %} {% block content %}

<h2>{{ AUDIT.title }}</h2>

<form action="{{ url_for('submit') }}" method="post">
  <label for="business_name"> {{ AUDIT.fields.business_name }} </label>
  <input id="business_name" name="business_name" required />

  <label for="email"> {{ AUDIT.fields.email }} </label>
  <input id="email" name="email" type="email" required />

  <hr />

  {% for q in questions %}
  <fieldset>
    <legend>{{ loop.index }}. {{ q.text }}</legend>

    <label>
      <input type="radio" name="{{ q.id }}" value="yes" required />
      {{ AUDIT.answers.yes }}
    </label>

    <label>
      <input type="radio" name="{{ q.id }}" value="no" />
      {{ AUDIT.answers.no }}
    </label>

    <label>
      <input type="radio" name="{{ q.id }}" value="na" />
      {{ AUDIT.answers.na }}
    </label>
  </fieldset>
  {% endfor %}

  <button type="submit">{{ AUDIT.submit }}</button>
</form>

{% endblock %}
