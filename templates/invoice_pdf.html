<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        font-size: 11pt;
      }
      h1 {
        font-size: 16pt;
      }
      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
      }
      td,
      th {
        padding: 6px;
        border-bottom: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>Rechnung</h1>

    <p>
      <strong>{{ company }}</strong><br />
      {{ PRODUCT.name }}
    </p>

    <p>
      Rechnungsnummer: {{ submission.invoice_number }}<br />
      Datum: {{ submission.created_at_human }}
    </p>

    <table>
      <tr>
        <th>Leistung</th>
        <th>Betrag</th>
      </tr>
      <tr>
        <td>IT-Sicherheits-Einordnung (MedSecure)</td>
        <td>CHF 49.-</td>
      </tr>
    </table>

    <p>
      <strong>Total: CHF 49.-</strong><br />
      Nicht mehrwertsteuerpflichtig.
    </p>

    <p>
      IBAN: {{ IBAN }}<br />
      Zahlungsfrist: 10 Tage
    </p>
  </body>
</html>
